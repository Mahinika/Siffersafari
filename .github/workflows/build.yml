name: Build and Release APK

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    
    steps:
      - uses: actions/checkout@v4
      
      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
      
      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true
      
      - name: Get dependencies
        run: flutter pub get
      
      - name: Build runner
        run: dart run build_runner build --delete-conflicting-outputs
      
      - name: Analyze
        run: flutter analyze --fatal-infos lib test integration_test

      - name: Validate signing secrets
        run: |
          if [ -z "${{ secrets.KEYSTORE_BASE64 }}" ] || [ -z "${{ secrets.KEYSTORE_PASSWORD }}" ]; then
            echo "Missing KEYSTORE_BASE64 or KEYSTORE_PASSWORD secret"
            exit 1
          fi
      
      - name: Decode keystore
        run: |
          echo "${{ secrets.KEYSTORE_BASE64 }}" | base64 --decode > android/app/upload-keystore.jks
      
      - name: Create key.properties
        run: |
          cat > android/key.properties << EOF
          storePassword=${{ secrets.KEYSTORE_PASSWORD }}
          keyPassword=${{ secrets.KEYSTORE_PASSWORD }}
          keyAlias=upload-key
          storeFile=upload-keystore.jks
          EOF
      
      - name: Build APK
        run: flutter build apk --release
      
      - name: Resolve release version
        id: version
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            VERSION_FULL=$(grep "version:" pubspec.yaml | head -1 | sed 's/version: //g')
            VERSION="${VERSION_FULL%%+*}"
            BUILD_NUMBER=""
            if [[ "$VERSION_FULL" == *"+"* ]]; then
              BUILD_NUMBER="${VERSION_FULL#*+}"
            fi
            TAG_NAME="v${VERSION}"
          else
            TAG_NAME="${GITHUB_REF#refs/tags/}"
            VERSION_FULL="${TAG_NAME#v}"
            VERSION="${VERSION_FULL%%+*}"
            BUILD_NUMBER=""
            if [[ "$VERSION_FULL" == *"+"* ]]; then
              BUILD_NUMBER="${VERSION_FULL#*+}"
            fi
          fi

          echo "VERSION_FULL=$VERSION_FULL" >> $GITHUB_OUTPUT
          echo "VERSION=$VERSION" >> $GITHUB_OUTPUT
          echo "BUILD_NUMBER=$BUILD_NUMBER" >> $GITHUB_OUTPUT
          echo "TAG_NAME=$TAG_NAME" >> $GITHUB_OUTPUT

          echo "VERSION_FULL=${VERSION_FULL}"
          echo "VERSION=${VERSION}"
          echo "BUILD_NUMBER=${BUILD_NUMBER}"
          echo "TAG_NAME=${TAG_NAME}"
      
      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          files: build/app/outputs/flutter-apk/app-release.apk
          tag_name: ${{ steps.version.outputs.TAG_NAME }}
          name: Siffersafari ${{ steps.version.outputs.VERSION }}
          generate_release_notes: true
          body: |
            **Version:** ${{ steps.version.outputs.VERSION_FULL }}

            ### Installation
            1. Download `app-release.apk` below
            2. Transfer to your Android tablet
            3. Open file manager, find the APK, and tap to install
            4. If prompted about unknown sources, allow installation

            ### Feedback
            Test the app and report any issues!
          draft: false
          prerelease: ${{ contains(steps.version.outputs.VERSION, '-') }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
