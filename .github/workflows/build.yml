name: Build and Release APK

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    
    steps:
      - uses: actions/checkout@v4
      
      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
      
      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: 'stable'
      
      - name: Get dependencies
        run: flutter pub get
      
      - name: Build runner
        run: dart run build_runner build --delete-conflicting-outputs
      
      - name: Analyze
        run: flutter analyze
      
      - name: Decode keystore
        run: |
          echo "${{ secrets.KEYSTORE_BASE64 }}" | base64 --decode > android/upload-keystore.jks
      
      - name: Create key.properties
        run: |
          cat > android/key.properties << EOF
          storePassword=${{ secrets.KEYSTORE_PASSWORD }}
          keyPassword=${{ secrets.KEYSTORE_PASSWORD }}
          keyAlias=upload-key
          storeFile=upload-keystore.jks
          EOF
      
      - name: Build APK
        run: flutter build apk --release
      
      - name: Resolve release version
        id: version
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            VERSION=$(grep "version:" pubspec.yaml | head -1 | sed 's/version: //g')
            TAG_NAME="v${VERSION}"
          else
            TAG_NAME="${GITHUB_REF#refs/tags/}"
            VERSION="${TAG_NAME#v}"
          fi
          echo "VERSION=$VERSION" >> $GITHUB_OUTPUT
          echo "TAG_NAME=$TAG_NAME" >> $GITHUB_OUTPUT
          echo "VERSION=${VERSION}"
          echo "TAG_NAME=${TAG_NAME}"
      
      - name: Create Release
        uses: softprops/action-gh-release@v1
        with:
          files: build/app/outputs/flutter-apk/app-release.apk
          tag_name: ${{ steps.version.outputs.TAG_NAME }}
          name: Siffersafari ${{ steps.version.outputs.VERSION }}
          body: |
            ## Alpha Release
            
            **Version:** ${{ steps.version.outputs.VERSION }}
            
            ### How to install:
            1. Download `app-release.apk` below
            2. Transfer to your Android tablet
            3. Open file manager, find the APK, and tap to install
            4. If prompted about unknown sources, allow installation
            
            ### What's new:
            - See commit history for details
            
            ### Feedback:
            Test the app and report any issues!
          draft: false
          prerelease: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
