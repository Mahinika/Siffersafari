name: Flutter CI

on:
  push:
    paths:
      - 'lib/**'
      - 'test/**'
      - 'integration_test/**'
      - 'pubspec.yaml'
      - '.github/workflows/flutter.yml'
  pull_request:
    paths:
      - 'lib/**'
      - 'test/**'
      - 'integration_test/**'
      - 'pubspec.yaml'
      - '.github/workflows/flutter.yml'

concurrency:
  group: flutter-ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4

      - uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Flutter pub get
        run: flutter pub get

      - name: Build generated files (Hive/Riverpod)
        run: dart run build_runner build --delete-conflicting-outputs

      - name: Analyze (app + tests)
        run: flutter analyze --fatal-infos lib test integration_test

      - name: Run tests
        run: flutter test test
