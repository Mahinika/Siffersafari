name: siffersafari
description: Siffersafari — an educational math game for children to practice basic arithmetic.
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  
  # State Management
  flutter_riverpod: ^2.4.0
  
  # Local Storage
  hive: ^2.2.3
  hive_flutter: ^1.1.0
  path_provider: ^2.1.0
  
  # Animations & Graphics
  lottie: ^3.3.0
  
  # Audio
  audioplayers: ^6.6.0
  
  # UI & Design
  flutter_screenutil: ^5.9.0
  
  # Utilities
  equatable: ^2.0.5
  get_it: ^9.2.1
  uuid: ^4.2.1
  bcrypt: ^1.2.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  integration_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  image: ^4.8.0
  
  # Code Generation
  build_runner: ^2.4.7
  riverpod_generator: ^2.3.0
  hive_generator: ^2.0.1
  # Testing
  mocktail: ^1.0.1

flutter:
  uses-material-design: true
  
  assets:
    # Lista ljudfiler explicit så att backups (t.ex. *.wav.backup_*)
    # inte råkar packas in i APK:n.
    - assets/sounds/background_music.wav
    - assets/sounds/celebration.wav
    - assets/sounds/click.wav
    - assets/sounds/correct.wav
    - assets/sounds/wrong.wav
    - assets/animations/
    - assets/images/
    - assets/images/themes/space/
    - assets/images/themes/jungle/
